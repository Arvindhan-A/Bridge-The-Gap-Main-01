<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BDG Chapters – World Map</title>
  <style>
    /* ================================================================
       BDG ROBOTICS FOUNDATION — CHAPTERS WORLD MAP
       Brand palette:
         --bg      #F7F5FA   ghost-white      (page background, popups)
         --dark    #1D1634   midnight-violet  (ocean, dark backgrounds)
         --accent  #645D77   dusty-lavender   (borders, buttons, CTAs)
         --gray    #9D97AE   lilac-ash        (secondary text, muted UI)
         --gold    #9D97AE   lilac-ash        (pins — visible on dark bg)
         --beige   #4F4865   vintage-grape    (country tint, mid elements)
    ================================================================ */
    :root {
      --bg:     #F7F5FA;
      --dark:   #1D1634;
      --accent: #645D77;
      --gray:   #9D97AE;
      --gold:   #9D97AE;
      --beige:  #4F4865;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Map shell ── */
    #bdg-map {
      position: relative;
      width: 100%;
      background: var(--dark);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 52px rgba(29,22,52,.65);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #world-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── Map geometry ── */
    .country {
      fill: rgba(79,72,101,.12);
      stroke: rgba(100,93,119,.45);
      stroke-width: .4;
      transition: fill .22s;
    }
    .country:hover { fill: rgba(79,72,101,.24); }

    .graticule {
      fill: none;
      stroke: rgba(157,151,174,.15);
      stroke-width: .35;
      stroke-dasharray: 2,7;
    }

    /* ── Pins ── */
    .chapter-pin { cursor: pointer; }

    /* Ripple rings */
    .pin-ripple {
      fill: none;
      stroke: var(--gold);
      stroke-width: 1.2;
      transform-box: fill-box;
      transform-origin: center;
      animation: pin-ripple 3s ease-out infinite;
    }
    .pin-ripple.r2 { animation-delay: 1.5s; }

    @keyframes pin-ripple {
      0%   { transform: scale(1);   opacity: .85; }
      100% { transform: scale(3.4); opacity: 0;   }
    }

    .pin-ring {
      fill: none;
      stroke: var(--gold);
      stroke-width: 1.6;
      transition: stroke .2s;
    }
    .pin-core {
      fill: var(--gold);
      transition: fill .2s;
    }

    .chapter-pin:hover .pin-ring  { stroke: var(--accent); }
    .chapter-pin:hover .pin-core  { fill:  var(--accent); }
    .chapter-pin.active .pin-ring { stroke: var(--accent); }
    .chapter-pin.active .pin-core { fill:  var(--accent); }

    /* Remove-mode highlight */
    .pins-remove .chapter-pin { cursor: not-allowed; }
    .pins-remove .chapter-pin:hover .pin-ring { stroke: #c23b3b; }
    .pins-remove .chapter-pin:hover .pin-core { fill:  #c23b3b; }

    /* Pin label */
    .pin-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .05em;
      fill: rgba(247,245,250,.72);
      text-anchor: middle;
      dominant-baseline: hanging;
      pointer-events: none;
    }

    /* ── Tooltip ── */
    #bdg-tip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      z-index: 15;
      background: var(--dark);
      color: var(--bg);
      border: 1px solid rgba(100,93,119,.7);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .05em;
      white-space: nowrap;
      transform: translate(-50%, calc(-100% - 20px));
      transition: opacity .14s;
    }
    #bdg-tip.show { opacity: 1; }

    /* ── Chapter Popup ── */
    #bdg-popup {
      position: absolute;
      z-index: 20;
      width: 224px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(7px);
      transition: opacity .2s, transform .2s;
    }
    #bdg-popup.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .pu-card {
      position: relative;
      background: var(--bg);
      border: 1px solid rgba(100,93,119,.6);
      border-radius: 11px;
      padding: 15px 17px 14px;
      box-shadow: 0 8px 34px rgba(29,22,52,.55);
    }

    /* Downward caret */
    .pu-card::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 14px; height: 14px;
      background: var(--bg);
      border-right: 1px solid rgba(100,93,119,.6);
      border-bottom: 1px solid rgba(100,93,119,.6);
    }
    /* Upward caret (popup below pin) */
    #bdg-popup.flipped .pu-card::after {
      bottom: auto;
      top: -8px;
      border-right: none;
      border-bottom: none;
      border-left: 1px solid rgba(100,93,119,.6);
      border-top:  1px solid rgba(100,93,119,.6);
    }

    .pu-eyebrow {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .pu-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.25;
      margin-bottom: 9px;
    }
    .pu-pres-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--gray);
      margin-bottom: 2px;
    }
    .pu-pres-name {
      font-size: 12.5px;
      color: var(--dark);
      margin-bottom: 13px;
    }
    .pu-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .07em;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s;
      font-family: inherit;
    }
    .pu-btn:hover { background: var(--gold); color: var(--dark); }
    .pu-btn.no-url { opacity: .42; cursor: default; pointer-events: none; }
    .pu-close {
      position: absolute;
      top: 9px; right: 11px;
      background: none;
      border: none;
      font-size: 15px;
      line-height: 1;
      color: var(--gray);
      cursor: pointer;
      transition: color .14s;
    }
    .pu-close:hover { color: var(--dark); }

    /* ── Admin panel ── */
    #bdg-admin {
      display: none;
      position: absolute;
      top: 14px; left: 14px;
      z-index: 30;
      background: rgba(20,13,40,.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100,93,119,.5);
      border-radius: 12px;
      padding: 14px 16px 13px;
      min-width: 218px;
      box-shadow: 0 6px 28px rgba(0,0,0,.55);
    }
    #bdg-admin.on { display: block; }

    .adm-title {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .adm-f {
      display: block;
      width: 100%;
      background: rgba(247,245,250,.06);
      border: 1px solid rgba(100,93,119,.28);
      border-radius: 5px;
      color: var(--bg);
      font-size: 11.5px;
      padding: 6px 9px;
      margin-bottom: 6px;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
    }
    .adm-f:focus  { border-color: var(--gold); }
    .adm-f::placeholder { color: rgba(157,151,174,.45); }

    .adm-status {
      font-size: 10.5px;
      color: var(--gold);
      min-height: 15px;
      margin-bottom: 8px;
      font-style: italic;
    }
    .adm-row { display: flex; gap: 6px; }

    .adm-btn {
      flex: 1;
      border: none;
      border-radius: 5px;
      padding: 7px 5px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .btn-add { background: var(--gold); color: var(--dark); }
    .btn-add:hover  { background: var(--beige); }
    .btn-add.on { background: var(--accent); color: #fff; }

    .btn-rem { background: rgba(79,72,101,.18); color: var(--gray); border: 1px solid rgba(100,93,119,.22); }
    .btn-rem:hover { background: rgba(79,72,101,.32); }
    .btn-rem.on { background: #8b2b2b; color: #fff; border-color: #a33; }

    .btn-export {
      display: block;
      width: 100%;
      margin-top: 8px;
      background: transparent;
      border: 1px solid rgba(157,151,174,.28);
      border-radius: 5px;
      color: rgba(157,151,174,.7);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
      padding: 5px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, color .15s;
    }
    .btn-export:hover { border-color: var(--gray); color: var(--gray); }

    /* ── Coordinate hint (admin only) ── */
    #bdg-coords {
      position: absolute;
      bottom: 10px; right: 12px;
      font-size: 9.5px;
      color: rgba(157,151,174,.5);
      font-family: 'Courier New', monospace;
      pointer-events: none;
      letter-spacing: .03em;
    }

    /* ── Placing-mode cursor ── */
    #world-svg.placing { cursor: crosshair; }
  </style>
</head>
<body>

<!-- ================================================================
  BDG CHAPTERS WORLD MAP
  ──────────────────────────────────────────────────────────────────
  USAGE:
    • Drop this entire block wherever you want the map on your page.
    • The map matches your site's brand palette automatically.

  ADMIN / EDITING:
    • Add  ?admin=true  to the page URL to unlock the edit panel.
    • Fill in chapter details, click "+ Add Pin", then click the map.
    • Click "− Remove", then click any existing pin to delete it.
    • Click "⬇ Copy config" to copy the current JSON to your clipboard.
      Paste it into DEFAULT_CHAPTERS below to make edits permanent.

  PERMANENT EDITS:
    • Chapters are stored in this browser's localStorage by default.
    • To make changes show for everyone, update DEFAULT_CHAPTERS
      at the top of the <script> section below with the exported JSON,
      then re-upload the file.

  CHAPTER URLs:
    • Set each chapter's `url` field to the full chapter page path,
      e.g.  "url": "/chapters/chennai"  or  "url": "https://..."
================================================================ -->

<div id="bdg-map">

  <!-- SVG canvas — Natural Earth projection, 960×480 viewBox -->
  <svg id="world-svg" viewBox="0 0 960 480" aria-label="BDG Chapter locations world map"></svg>

  <!-- Hover tooltip -->
  <div id="bdg-tip" role="tooltip"></div>

  <!-- Chapter popup -->
  <div id="bdg-popup" role="dialog" aria-modal="true" aria-label="Chapter details">
    <div class="pu-card">
      <button class="pu-close" id="pu-close" aria-label="Close">×</button>
      <div class="pu-eyebrow">BDG Chapter</div>
      <div class="pu-name"       id="pu-name"></div>
      <div class="pu-pres-label">Chapter President</div>
      <div class="pu-pres-name"  id="pu-pres"></div>
      <a   class="pu-btn"        id="pu-link" href="#" target="_blank" rel="noopener">Visit Chapter →</a>
    </div>
  </div>

  <!-- Admin edit panel (visible only at ?admin=true) -->
  <div id="bdg-admin" role="region" aria-label="Map admin panel">
    <div class="adm-title">⚙ Map Admin</div>
    <input class="adm-f" id="adm-name" type="text"  placeholder="Chapter name *" autocomplete="off">
    <input class="adm-f" id="adm-pres" type="text"  placeholder="President name"  autocomplete="off">
    <input class="adm-f" id="adm-url"  type="url"   placeholder="Chapter URL"     autocomplete="off">
    <div class="adm-status" id="adm-status">Fill details, click Add Pin, then tap the map.</div>
    <div class="adm-row">
      <button class="adm-btn btn-add" id="btn-add">+ Add Pin</button>
      <button class="adm-btn btn-rem" id="btn-rem">− Remove</button>
    </div>
    <button class="btn-export" id="btn-export">⬇ Copy config to clipboard</button>
  </div>

  <!-- Coordinate readout (admin mode) -->
  <div id="bdg-coords"></div>

</div>
<!-- /BDG chapters map -->


<!-- D3 v7 + TopoJSON for the world data -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
/* ================================================================
   CHAPTER DATA — edit this array to permanently update chapters.
   Export updated data using the "Copy config" button in admin mode.
================================================================ */
const DEFAULT_CHAPTERS = [
  {
    id:        "chennai",
    name:      "Chennai Chapter",
    president: "TBD",
    url:       "#",
    lat:       13.0827,
    lng:       80.2707
  }
];

/* ================================================================
   STORAGE  (browser localStorage — device-specific)
   Changes made in admin mode persist in this browser.
   To make them permanent for all visitors → use "Copy config".
================================================================ */
const STORAGE_KEY = "bdg-chapters-v1";

function loadChapters() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : clone(DEFAULT_CHAPTERS);
  } catch {
    return clone(DEFAULT_CHAPTERS);
  }
}
function saveChapters(arr) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch {}
}
function clone(x) { return JSON.parse(JSON.stringify(x)); }

let chapters = loadChapters();

/* ================================================================
   ADMIN MODE — enabled by ?admin=true in the URL
================================================================ */
const IS_ADMIN = new URLSearchParams(window.location.search).get("admin") === "true";
if (IS_ADMIN) document.getElementById("bdg-admin").classList.add("on");

/* ================================================================
   D3 / SVG SETUP
================================================================ */
const W = 960, H = 480;
const svg = d3.select("#world-svg");

/* SVG defs: dot-grid pattern for the ocean */
const defs = svg.append("defs");
const dotPat = defs.append("pattern")
  .attr("id", "bdg-dots")
  .attr("x", 0).attr("y", 0)
  .attr("width", 18).attr("height", 18)
  .attr("patternUnits", "userSpaceOnUse");
dotPat.append("circle")
  .attr("cx", 1).attr("cy", 1).attr("r", 0.85)
  .attr("fill", "rgba(157,151,174,.18)");

/* Natural Earth projection — aesthetically balanced for a world overview */
const projection = d3.geoNaturalEarth1()
  .scale(153)
  .translate([W / 2, H / 2]);

const geoPath  = d3.geoPath(projection);
const graticule = d3.geoGraticule();

/* Layer order (back → front) */
const gSphere  = svg.append("g"); // ocean
const gDots    = svg.append("g"); // dot overlay
const gGrat    = svg.append("g"); // lat/lon grid
const gLand    = svg.append("g"); // country fills
const gBorders = svg.append("g"); // interior borders
const gPins    = svg.append("g"); // chapter pins

/* ── Ocean (sphere) ── */
gSphere.append("path")
  .datum({ type: "Sphere" })
  .attr("d", geoPath)
  .attr("fill", "#1D1634");

/* ── Dot overlay ── */
gDots.append("path")
  .datum({ type: "Sphere" })
  .attr("d", geoPath)
  .attr("fill", "url(#bdg-dots)");

/* ── Graticule (lat/lon lines, dashed) ── */
gGrat.append("path")
  .datum(graticule())
  .attr("d", geoPath)
  .attr("class", "graticule");

/* ================================================================
   TOOLTIP
================================================================ */
const tipEl = document.getElementById("bdg-tip");

function showTip(text, svgX, svgY) {
  const map   = document.getElementById("bdg-map");
  const scale = map.clientWidth / W;
  tipEl.textContent  = text;
  tipEl.style.left   = (svgX * scale) + "px";
  tipEl.style.top    = (svgY * scale) + "px";
  tipEl.classList.add("show");
}
function hideTip() { tipEl.classList.remove("show"); }

/* ================================================================
   POPUP
================================================================ */
const popupEl  = document.getElementById("bdg-popup");
const puName   = document.getElementById("pu-name");
const puPres   = document.getElementById("pu-pres");
const puLink   = document.getElementById("pu-link");

let activeChId  = null;   // id of the currently-open chapter
let activePinEl = null;   // the D3 selection of the active pin group

function showPopup(ch, svgX, svgY) {
  /* Fill content */
  puName.textContent  = ch.name;
  puPres.textContent  = ch.president || "TBD";

  const hasUrl = ch.url && ch.url !== "#";
  puLink.href          = hasUrl ? ch.url : "#";
  puLink.textContent   = hasUrl ? "Visit Chapter →" : "URL not configured yet";
  puLink.className     = "pu-btn" + (hasUrl ? "" : " no-url");

  /* Position — centered above the pin */
  const map    = document.getElementById("bdg-map");
  const scale  = map.clientWidth / W;
  const px     = svgX * scale;
  const py     = svgY * scale;
  const PW     = 224;   // popup width (matches CSS)
  const PH     = 160;   // estimated popup height

  let left = px - PW / 2;
  let top  = py - PH - 24;
  const flipped = top < 8;
  if (flipped) top = py + 20;

  left = Math.max(8, Math.min(left, map.clientWidth - PW - 8));

  popupEl.style.left = left + "px";
  popupEl.style.top  = top  + "px";
  popupEl.classList.toggle("flipped", flipped);
  popupEl.classList.add("open");

  activeChId = ch.id;
}

function hidePopup() {
  popupEl.classList.remove("open");
  if (activePinEl) { activePinEl.classed("active", false); activePinEl = null; }
  activeChId = null;
}

document.getElementById("pu-close").addEventListener("click", hidePopup);

/* Click ocean/background to close popup */
svg.on("click.bg", function(e) {
  if (placing) return;
  if (e.target === svg.node() || e.target.classList.contains("graticule")) hidePopup();
});

/* Reposition open popup on window resize */
window.addEventListener("resize", () => {
  if (!activeChId || !popupEl.classList.contains("open")) return;
  const ch     = chapters.find(c => c.id === activeChId);
  if (!ch) return;
  const coords = projection([ch.lng, ch.lat]);
  if (coords) showPopup(ch, coords[0], coords[1]);
});

/* ================================================================
   PIN RENDERING
================================================================ */
function drawPins() {
  gPins.selectAll(".chapter-pin").remove();

  chapters.forEach(ch => {
    const pt = projection([ch.lng, ch.lat]);
    if (!pt) return;
    const [cx, cy] = pt;

    const g = gPins.append("g")
      .attr("class", "chapter-pin")
      .attr("transform", `translate(${cx},${cy})`);

    /* Ripple rings */
    g.append("circle").attr("class", "pin-ripple").attr("r", 8);
    g.append("circle").attr("class", "pin-ripple r2").attr("r", 8);

    /* Outer ring */
    g.append("circle").attr("class", "pin-ring").attr("r", 9);

    /* Core dot */
    g.append("circle").attr("class", "pin-core").attr("r", 4.5);

    /* Label beneath pin */
    g.append("text").attr("class", "pin-label").attr("y", 14).text(ch.name);

    /* ── Events ── */
    g.on("mouseenter", () => { if (!removing) showTip(ch.name, cx, cy - 12); });
    g.on("mouseleave", hideTip);

    g.on("click", e => {
      e.stopPropagation();
      hideTip();

      /* Remove mode: click to delete */
      if (removing) { doRemove(ch.id); return; }
      if (placing)  return;

      /* Open popup */
      hidePopup();
      if (activePinEl) activePinEl.classed("active", false);
      activePinEl = d3.select(g.node());
      activePinEl.classed("active", true);
      showPopup(ch, cx, cy);
    });
  });
}

/* ================================================================
   ADMIN CONTROLS
================================================================ */
let placing  = false;
let removing = false;

const btnAdd   = document.getElementById("btn-add");
const btnRem   = document.getElementById("btn-rem");
const admStat  = document.getElementById("adm-status");
const svgDom   = document.getElementById("world-svg");

/* ── Add mode ── */
btnAdd.addEventListener("click", () => {
  if (removing) stopRemove();
  placing = !placing;
  if (placing) {
    btnAdd.textContent = "✕ Cancel";
    btnAdd.classList.add("on");
    admStat.textContent = "Click anywhere on the map to place the pin.";
    svgDom.classList.add("placing");
  } else {
    stopPlace();
  }
});

function stopPlace(msg) {
  placing = false;
  btnAdd.textContent = "+ Add Pin";
  btnAdd.classList.remove("on");
  svgDom.classList.remove("placing");
  if (msg) admStat.textContent = msg;
  else admStat.textContent = "Fill details, click Add Pin, then tap the map.";
}

/* ── Remove mode ── */
btnRem.addEventListener("click", () => {
  if (placing) stopPlace();
  removing = !removing;
  if (removing) {
    btnRem.textContent = "✕ Cancel";
    btnRem.classList.add("on");
    admStat.textContent = "Click a pin on the map to remove it.";
    gPins.classed("pins-remove", true);
  } else {
    stopRemove();
  }
});

function stopRemove(msg) {
  removing = false;
  btnRem.textContent = "− Remove";
  btnRem.classList.remove("on");
  gPins.classed("pins-remove", false);
  if (msg) admStat.textContent = msg;
}

function doRemove(id) {
  const ch = chapters.find(c => c.id === id);
  chapters  = chapters.filter(c => c.id !== id);
  saveChapters(chapters);
  drawPins();
  hidePopup();
  stopRemove(ch ? `✓ "${ch.name}" removed.` : "Pin removed.");
}

/* ── Click-to-place ── */
svg.on("click.place", e => {
  if (!placing) return;

  const name = document.getElementById("adm-name").value.trim();
  if (!name) { admStat.textContent = "⚠ Enter a chapter name first."; return; }

  const [mx, my] = d3.pointer(e);
  const geo = projection.invert([mx, my]);
  if (!geo) return;

  const newCh = {
    id:        "ch-" + Date.now(),
    name,
    president: document.getElementById("adm-pres").value.trim() || "TBD",
    url:       document.getElementById("adm-url").value.trim()  || "#",
    lat:       +geo[1].toFixed(4),
    lng:       +geo[0].toFixed(4)
  };

  chapters.push(newCh);
  saveChapters(chapters);
  drawPins();

  document.getElementById("adm-name").value = "";
  document.getElementById("adm-pres").value = "";
  document.getElementById("adm-url").value  = "";
  stopPlace(`✓ "${name}" added!`);
});

/* ── Export config ── */
document.getElementById("btn-export").addEventListener("click", () => {
  const json = JSON.stringify(chapters, null, 2);
  navigator.clipboard.writeText(json)
    .then(()  => admStat.textContent = "✓ Copied! Paste into DEFAULT_CHAPTERS in the JS.")
    .catch(()  => { admStat.textContent = "Copy failed — see console."; console.log(json); });
});

/* ── Coordinate readout (admin only) ── */
if (IS_ADMIN) {
  const coordEl = document.getElementById("bdg-coords");
  svg.on("mousemove.coords", e => {
    const [mx, my] = d3.pointer(e);
    const geo = projection.invert([mx, my]);
    if (geo) {
      const lat = Math.abs(geo[1]).toFixed(2);
      const lng = Math.abs(geo[0]).toFixed(2);
      coordEl.textContent =
        `${lat}°${geo[1] >= 0 ? "N" : "S"}  ${lng}°${geo[0] >= 0 ? "E" : "W"}`;
    }
  });
}

/* ================================================================
   LOAD WORLD DATA + RENDER
================================================================ */
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    const borders   = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);

    /* Country fills */
    gLand.selectAll("path")
      .data(countries.features)
      .join("path")
      .attr("class", "country")
      .attr("d", geoPath);

    /* Interior borders (slightly separate layer, more subtle) */
    gBorders.append("path")
      .datum(borders)
      .attr("fill",         "none")
      .attr("stroke",       "rgba(100,93,119,.2)")
      .attr("stroke-width", 0.25)
      .attr("d", geoPath);

    /* Outer sphere border */
    gBorders.append("path")
      .datum({ type: "Sphere" })
      .attr("fill",         "none")
      .attr("stroke",       "rgba(100,93,119,.45)")
      .attr("stroke-width", 0.7)
      .attr("d", geoPath);

    drawPins();
  })
  .catch(() => {
    /* Fallback if CDN fails */
    gSphere.append("text")
      .attr("x", W / 2).attr("y", H / 2)
      .attr("text-anchor", "middle")
      .attr("fill", "rgba(157,151,174,.5)")
      .attr("font-size", 13)
      .attr("font-family", "system-ui, sans-serif")
      .text("Map data could not load — check your internet connection.");
    drawPins();
  });
</script>
