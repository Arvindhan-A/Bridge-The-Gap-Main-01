{% extends "base.html" %}
{% block title %}Edit Event - Admin{% endblock %}
{% block content %}
<div class="form-page">
    <h1>Edit Event</h1>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ event.title }}" required>
        </div>
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" value="{{ event.author or 'Admin' }}">
        </div>
        <div class="form-group">
            <label for="content">Content (HTML)</label>
            <textarea id="content" name="content" rows="10" required>{{ event.content }}</textarea>
        </div>
        <div class="form-group">
            <label for="description">Description (excerpt)</label>
            <textarea id="description" name="description" rows="2">{{ event.description }}</textarea>
        </div>
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" value="{{ event.date.strftime('%Y-%m-%d') if event.date else '' }}" required>
        </div>
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="published"{% if event.status == 'published' %} selected{% endif %}>Published</option>
                <option value="upcoming"{% if event.status == 'upcoming' %} selected{% endif %}>Upcoming</option>
                <option value="past"{% if event.status == 'past' %} selected{% endif %}>Past</option>
                <option value="completed"{% if event.status == 'completed' %} selected{% endif %}>Completed</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-accent">Save Changes</button>
            <a href="/events" class="btn-outline">Cancel</a>
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    </form>
</div>
{% endblock %}
